name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configure deployment paths
        shell: bash
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::Set the repository variable NEXT_PUBLIC_API_URL to the public Cloudflare Tunnel URL."
            exit 1
          fi

          repository_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY%%/*}"

          if [ "$repository_name" = "$owner_name.github.io" ]; then
            base_path=""
          else
            base_path="/$repository_name"
          fi

          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_BASE_PATH=$base_path" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
